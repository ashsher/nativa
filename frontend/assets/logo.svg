<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  width="100"
  height="100"
  role="img"
  aria-label="Nativa logo"
>
  <!--
    Nativa wordmark logo.
    Stylised letter "N" in the primary accent colour (#00E5A0)
    on a transparent background.
    The letterform uses two thick verticals joined by a diagonal
    stroke — an editorial, geometric interpretation of the letter.
  -->

  <!-- Left vertical bar of the N -->
  <rect x="12" y="18" width="14" height="64" rx="3" fill="#00E5A0"/>

  <!-- Right vertical bar of the N -->
  <rect x="74" y="18" width="14" height="64" rx="3" fill="#00E5A0"/>

  <!--
    Diagonal stroke connecting top-left to bottom-right.
    Uses a parallelogram polygon for a sharp, editorial cut.
  -->
  <polygon
    points="26,18 40,18 74,82 60,82"
    fill="#00E5A0"
  />

  <!-- Subtle dot accent at the baseline — brand detail -->
  <circle cx="50" cy="92" r="4" fill="#00E5A0" opacity="0.5"/>
</svg>
