# alembic.ini
# Alembic database migration configuration for the Nativa backend.
#
# This file is the entry point for all `alembic` CLI commands.
# The actual migration env setup lives in backend/migrations/env.py.

[alembic]
# Path to the migration scripts folder
script_location = backend/migrations

# Jinja2 template for generating migration filenames
# %%(year)d-%%(month).2d-%%(day).2d_%%(rev)s_%%(slug)s
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration file timestamps
timezone = UTC

# ─── Database URL ─────────────────────────────────────────────────────────────
# Placeholder — overridden at runtime by backend/migrations/env.py which reads
# DATABASE_URL from the environment.  Do NOT hard-code credentials here.
sqlalchemy.url = postgresql+asyncpg://nativa:password@localhost:5432/nativa

# ─── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class   = StreamHandler
args    = (sys.stderr,)
level   = NOTSET
formatter = generic

[formatter_generic]
format    = %(levelname)-5.5s [%(name)s] %(message)s
datefmt   = %H:%M:%S
