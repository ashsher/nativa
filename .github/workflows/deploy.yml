name: CI and Deploy

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Build backend image
        run: docker compose build backend

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ] || [ -z "${VPS_SSH_KEY:-}" ] || [ -z "${VPS_APP_DIR:-}" ]; then
            echo "Missing required secrets. Required: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_DIR"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          SSH_PORT="${VPS_PORT:-22}"

          ssh-keyscan -p "$SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

          ssh -p "$SSH_PORT" "$VPS_USER@$VPS_HOST" "VPS_APP_DIR='$VPS_APP_DIR' bash -s" << 'EOF'
            set -euo pipefail

            cd "$VPS_APP_DIR"

            git fetch origin master
            git checkout master
            git pull --ff-only origin master

            docker compose pull || true
            docker compose up -d --build

            # Repo-specific Alembic invocation (works with current image layout).
            docker compose run --rm \
              -e PYTHONPATH=/src/backend \
              -v "$PWD:/src" \
              -w /src \
              backend alembic -c alembic.ini upgrade head

            docker compose ps

            # Basic health check against backend container.
            docker compose exec -T backend sh -lc "python - <<'PY'
import urllib.request, sys
try:
    r = urllib.request.urlopen('http://127.0.0.1:8000/', timeout=10)
    body = r.read().decode('utf-8', errors='replace')
    print(body)
    if r.status != 200:
        sys.exit(1)
except Exception as e:
    print(e)
    sys.exit(1)
PY"
          EOF
