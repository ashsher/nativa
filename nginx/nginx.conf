# nginx.conf — Nativa Part 2 reverse proxy configuration.
#
# This file configures Nginx to:
#   1. Redirect all HTTP traffic to HTTPS.
#   2. Serve frontend static files with caching.
#   3. Proxy /api/* requests to the FastAPI backend with rate limiting.
#   4. Apply security headers on all responses.
#   5. Enable gzip compression for text assets.

# ── Rate limiting zones ────────────────────────────────────────────────────────
# Limit by $binary_remote_addr (compact 4-byte IPv4 / 16-byte IPv6 form).
# "10m" allocates 10 MB of shared memory for IP tracking (~160 000 IPs).

# api zone: 30 req/s per IP for general API endpoints.
# A burst of 20 allows short spikes without immediately returning 429.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# auth zone: 10 req/s per IP for the /api/auth/ endpoint (stricter to prevent brute-force).
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

# ── Backend upstream ───────────────────────────────────────────────────────────
# The FastAPI service runs on port 8000 inside the Docker network.
# "backend" resolves to the Docker service hostname.
upstream backend {
    server backend:8000;
}

# ── HTTP server — redirect to HTTPS ───────────────────────────────────────────
# All plain HTTP traffic (port 80) is permanently redirected to HTTPS.
# This ensures all Telegram Mini-App traffic is encrypted.
server {
    listen 80;
    server_name _;  # match any hostname

    # 301 Moved Permanently — redirects HTTP to HTTPS, preserving the path.
    return 301 https://$host$request_uri;
}

# ── HTTPS server ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;  # match any hostname; set to your domain in production

    # ── SSL configuration ──────────────────────────────────────────────────────
    # Paths to TLS certificate and private key.
    # In production, replace these with Let's Encrypt paths:
    #   /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    #   /etc/letsencrypt/live/yourdomain.com/privkey.pem
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Allow only TLS 1.2 and 1.3; disable older insecure protocols.
    ssl_protocols TLSv1.2 TLSv1.3;

    # Use strong cipher suites; exclude anonymous (aNULL) and MD5 ciphers.
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Security headers ───────────────────────────────────────────────────────
    # Prevent the page from being embedded in an iframe on other origins.
    add_header X-Frame-Options SAMEORIGIN;

    # Prevent MIME-type sniffing (stops browsers from guessing content types).
    add_header X-Content-Type-Options nosniff;

    # Enable the browser's built-in XSS filter.
    add_header X-XSS-Protection "1; mode=block";

    # Content Security Policy:
    #   default-src 'self'             — only load resources from our own origin by default
    #   script-src  + telegram.org     — allow Telegram SDK and YouTube IFrame API
    #   style-src   + googleapis.com   — allow Google Fonts stylesheets
    #   frame-src   + youtube.com      — allow YouTube IFrame embeds
    #   connect-src 'self'             — fetch/XHR only to our own origin
    #   font-src    + gstatic.com      — allow Google Fonts font files
    #   'unsafe-inline'                — required for inline Telegram SDK scripts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org https://www.youtube.com https://fonts.googleapis.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com 'unsafe-inline'; frame-src https://www.youtube.com; connect-src 'self'; font-src 'self' https://fonts.gstatic.com;";

    # ── Gzip compression ───────────────────────────────────────────────────────
    # Compress text-based assets to reduce transfer size over mobile networks.
    gzip on;
    gzip_types text/css application/javascript application/json text/html;
    # Only compress responses larger than 1 KB (smaller files aren't worth compressing).
    gzip_min_length 1024;

    # ── Frontend static files ──────────────────────────────────────────────────
    # Serve HTML, CSS, JS, and assets from the /usr/share/nginx/html directory.
    # try_files falls back to index.html for client-side routing.
    location / {
        root /usr/share/nginx/html;   # mapped to ./frontend in docker-compose.yml
        # Try the exact path, then as a directory, then fall back to index.html.
        # This supports the single-page app pattern (no server-side routing needed).
        try_files $uri $uri/ /index.html;
        # Cache static assets for 1 hour; Telegram re-fetches after TTL.
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # ── Auth endpoint — stricter rate limiting ─────────────────────────────────
    # /api/auth/ receives Telegram InitData validation requests.
    # Stricter rate limit (10 r/s, burst=5) prevents brute-force enumeration.
    location /api/auth/ {
        # Apply the auth rate limiting zone; nodelay = return 429 immediately on overflow.
        limit_req zone=auth burst=5 nodelay;
        # Proxy to the FastAPI backend.
        proxy_pass http://backend;
        # Forward original Host so the backend can construct correct URLs.
        proxy_set_header Host $host;
        # Forward real client IP (used by the backend for audit logging).
        proxy_set_header X-Real-IP $remote_addr;
        # Forward the full chain of proxy IPs.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Tell the backend the original protocol (https) for redirect generation.
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── General API endpoints ──────────────────────────────────────────────────
    # All other /api/ requests are proxied with the standard (less strict) rate limit.
    location /api/ {
        # Apply the api rate limiting zone; burst=20 allows short spikes.
        limit_req zone=api burst=20 nodelay;
        # Proxy to the FastAPI backend.
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
